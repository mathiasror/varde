# varde-nginx default config — non-root friendly.
# Listens on 8080 (unprivileged), writes pid/temp under /tmp, logs to stdout/stderr,
# serves /app. Paths are absolute and in-image (no reliance on the compiled prefix).
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;

  # All writable state under the sticky /tmp (the rootfs is otherwise read-only-ish).
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  sendfile on;
  tcp_nopush on;

  server {
    listen 8080;
    server_name _;
    root /app;
    index index.html;

    location / {
      try_files $uri $uri/ =404;
    }
  }
}
