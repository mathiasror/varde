# Client access policy for the varde-postgres example (see Dockerfile/README).
#
# In-container connections (the /tmp unix socket and loopback) are trusted:
# anyone who can `docker exec` into the container already owns the uid that
# owns the data directory, so a password would add nothing there.
#
# TYPE    DATABASE  USER  ADDRESS       METHOD
local     all       all                 trust
host      all       all   127.0.0.1/32  trust
host      all       all   ::1/128       trust

# Everything else — other containers on the docker network, anything reaching
# the published port — must present a valid SCRAM password (set at initdb time
# via --pwfile; see README.md).
host      all       all   all           scram-sha-256
