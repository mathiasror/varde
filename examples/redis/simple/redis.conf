# varde-redis example config — a small, non-root-friendly Redis for a local /
# demo cache. redis-server reads this file because the Dockerfile passes its
# path as the first argument (see the CMD in the Dockerfile).
#
# Every directive below is chosen to work under the varde runtime contract:
# non-root user 1000:1000, WORKDIR /app (writable), no shell, no privileges.
# -----------------------------------------------------------------------------

# --- Networking --------------------------------------------------------------
# Standard Redis port. Publish it with `docker run -p 6379:6379 ...`.
port 6379

# Bind on all interfaces so the container is reachable from the host / other
# containers. (Redis defaults to 127.0.0.1, which is unreachable from outside
# the container's network namespace.)
bind 0.0.0.0

# protected-mode no:
#   FOR THIS TRUSTED LOCAL DEMO ONLY. With `bind 0.0.0.0` and no password,
#   protected mode would refuse remote connections; we disable it so the demo
#   "just works". In PRODUCTION do the opposite: keep `protected-mode yes`
#   and/or set `requirepass <a-strong-secret>` (and prefer binding to a private
#   network rather than 0.0.0.0).
protected-mode no

# --- Persistence -------------------------------------------------------------
# This demo is an EPHEMERAL cache, so we turn off both persistence mechanisms —
# nothing is written to disk, which also keeps the non-root filesystem quiet.
#
#   save ""       -> disable RDB point-in-time snapshots.
#   appendonly no -> disable the append-only file (AOF).
#
# If you DO want light durability, replace `save ""` with something like
# `save 60 1000` (snapshot if >=1000 keys changed in 60s); snapshots land in
# `dir` (below), which is writable by the app user.
save ""
appendonly no

# Where Redis writes its working files (RDB/AOF if enabled, plus temp files).
# /app is the WORKDIR and is owned by 1000:1000, so it is writable non-root.
dir /app

# --- Memory ------------------------------------------------------------------
# Cap memory and evict under pressure so an unbounded cache can't OOM the
# container. `allkeys-lru` evicts the least-recently-used key of ANY key when
# the cap is hit — the classic cache policy. Tune `maxmemory` to your needs.
maxmemory 64mb
maxmemory-policy allkeys-lru

# --- Logging -----------------------------------------------------------------
# Empty logfile => log to stdout, which is what you want in a container so
# `docker logs` (and any log collector) sees Redis output.
logfile ""
