# varde-rabbitmq example config — a small single-node broker for a local /
# demo deployment. The broker reads this file because the base image sets
# RABBITMQ_CONFIG_FILE=/app/rabbitmq.conf (and the Dockerfile COPYs it there).
#
# Every setting below works under the varde runtime contract: non-root user
# 1000:1000, all writable state under /app, no shell, no privileges.
# -----------------------------------------------------------------------------

# --- Networking --------------------------------------------------------------
# Standard AMQP 0-9-1 port. Publish it with `docker run -p 5672:5672 ...`.
listeners.tcp.default = 5672

# Management UI/API port (the plugin is enabled via the enabled_plugins file).
management.tcp.port = 15672

# loopback_users.guest = false:
#   FOR THIS TRUSTED LOCAL DEMO ONLY. By default the built-in guest/guest user
#   may only connect from localhost — which, inside a container, means nobody.
#   Allowing it remotely makes the demo "just work". In PRODUCTION do the
#   opposite: leave the loopback restriction alone and create a real user
#   (e.g. `default_user` / `default_pass` below, or definitions import).
loopback_users.guest = false

# Create a dedicated demo user instead of shipping guest-only access:
# default_user = demo
# default_pass = <a-strong-secret>

# --- Resources ---------------------------------------------------------------
# Note: free-DISK-space monitoring is disabled in this image (it needs
# /bin/sh + df, and varde ships no shell); `disk_free_limit` settings have no
# effect. Watch disk usage from your container platform. Memory monitoring
# works normally (read from /proc):
vm_memory_high_watermark.relative = 0.6

# --- Logging -----------------------------------------------------------------
# The base already logs to stdout (RABBITMQ_LOGS=-), which is what you want in
# a container. Raise/lower verbosity here if needed:
log.console.level = info
