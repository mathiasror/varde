name: e2e-examples

# Builds every example in examples/<image>/<variant>/ on top of a locally-built
# varde base (the musl default), smoke-tests that the app runs, and asserts an
# image-size budget. The bases are built with Nix (musl node/nginx/redis compile
# from source, so a full run is not fast); Actions minutes are free on public repos.
on:
  pull_request:
    paths:
      - "examples/**"
      - "images/**"
      - "lib/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/e2e.sh"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: build + smoke examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # Pull the bases from the shared cache that build.yml populates, instead of
      # recompiling the from-source musl variants here. (Reads are anonymous on
      # the public cache; the token is only needed to push.)
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: varde
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build examples on local bases, smoke-test, assert size budgets
        run: scripts/e2e.sh
