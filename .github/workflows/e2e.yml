name: e2e-examples

# Builds every example in examples/<image>/<variant>/ on top of a locally-built
# varde base (the musl default), smoke-tests that the app runs, and asserts an
# image-size budget. The bases are built with Nix (musl node/nginx/redis compile
# from source, so a full run is not fast); Actions minutes are free on public repos.
on:
  pull_request:
    paths:
      - "examples/**"
      - "images/**"
      - "lib/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/e2e.sh"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: build + smoke examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Build examples on local bases, smoke-test, assert size budgets
        run: scripts/e2e.sh
