name: build-image

# Builds every varde image discovered in images/*.nix — for each variant and on
# native amd64 + arm64 runners — scans each with Trivy (system packages + runtime
# via SBOM, plus an image filesystem scan), publishes per-arch tags to GHCR,
# keyless-signs them and attaches a CycloneDX SBOM + SLSA build-provenance
# attestation (cosign + GitHub OIDC), and stitches multi-arch + :latest manifest
# lists (signing each index).
# The build matrix and the :latest mapping come straight from the flake
# (.#ciMatrix / .#latestTags), so adding an image module needs no workflow changes.
# A shared Cachix cache holds the from-source musl builds so later runs (and the
# e2e workflow) pull them instead of recompiling.

on:
  push:
    branches: [main]
    # Build only when image inputs change: doc/site-only pushes skip the whole
    # matrix (pages.yml covers site/). The weekly cron below is unaffected —
    # schedule events ignore path filters — and workflow_dispatch remains for a
    # manual full run. Keep both lists in sync (Actions YAML has no anchors).
    paths:
      - "images/**"
      - "lib/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    # NOTE: if these jobs ever become *required* status checks, a path-filtered
    # PR would wait on them forever — keep required checks in sync with this.
    paths:
      - "images/**"
      - "lib/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly rebuild for fresh CVE fixes

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # keyless cosign signing + SBOM attestation (GitHub OIDC)
  actions: read # let codeql-action read this run for its telemetry call
  attestations: write # SLSA build-provenance attestation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never a half-done main publish: cancelling
  # mid-run skips the manifest job and leaves GHCR with per-arch tags but no
  # multi-arch/latest/alias manifest lists.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  TRIVY_USERNAME: ${{ github.actor }}
  TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  setup:
    name: compute matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      latest: ${{ steps.gen.outputs.latest }}
      aliases: ${{ steps.gen.outputs.aliases }}
    steps:
      - uses: actions/checkout@v5
      # `determinate: false` -> plain upstream Nix. The v22 default installs
      # Determinate Nix and tries a FlakeHub login on every job, which warns
      # ("determinate-nixd failed with exit code 1") since we don't use FlakeHub.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      # On the weekly cron, bump nixpkgs ONCE here and share the resolved lock with
      # every build job, so all images in a run — and both arches of each tag —
      # build against a single nixpkgs revision (otherwise each job's own
      # `nix flake update` could pull a different nixos-unstable tip).
      - name: Refresh nixpkgs (scheduled only)
        if: github.event_name == 'schedule'
        run: nix flake update
      - name: Upload resolved flake.lock
        uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock
      - id: gen
        name: Derive build matrix from the flake
        run: |
          # Cross each {image,tag,attr,sbomName} with the two native arches.
          matrix=$(nix eval --json .#ciMatrix | jq -c '{include: [
            .[] as $i
            | ({name:"amd64",runner:"ubuntu-latest"}, {name:"arm64",runner:"ubuntu-24.04-arm"}) as $a
            | $i + {arch:$a.name, runner:$a.runner}
          ]}')
          latest=$(nix eval --json .#latestTags)
          aliases=$(nix eval --json .#imageAliases)
          {
            echo "matrix=$matrix"
            echo "latest=$latest"
            echo "aliases=$aliases"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.image }}:${{ matrix.tag }} (${{ matrix.arch }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    # Cached builds finish in minutes; the ceiling exists for cache-cold musl
    # compiles (icu, erlang, postgres) while still cutting off wedged runners
    # well before the 6h default.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false # no FlakeHub login attempt (see setup job)
      # Shared binary cache: the first run compiles the from-source musl variants
      # (node/nginx/redis, and everything on aarch64-musl); every run after that
      # pulls them instead of recompiling. Public cache -> anonymous reads work
      # (fork PRs, end users); pushing needs the CACHIX_AUTH_TOKEN secret.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: varde
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build against the exact flake.lock the setup job resolved (see there), so
      # this run is internally consistent across images and arches.
      - name: Fetch shared flake.lock
        uses: actions/download-artifact@v8
        with:
          name: flake-lock

      - name: Build image
        env:
          ATTR: ${{ matrix.attr }}
        run: nix build -L ".#${ATTR}"

      - name: Generate SBOM (full closure incl. system packages)
        env:
          SBOM: ${{ matrix.sbomName }}
        run: nix run ".#${SBOM}" -- sbom.cdx.json

      - name: "Trivy: system packages + runtime (SBOM scan)"
        run: |
          # Report-only: a base image should still publish so its SBOM/SARIF stays
          # visible (Security tab) for downstream to act on. Enforce hard gates in
          # the *app* image, not here.
          nix run --inputs-from . nixpkgs#trivy -- sbom --scanners vuln --severity HIGH,CRITICAL sbom.cdx.json
          nix run --inputs-from . nixpkgs#trivy -- sbom --scanners vuln \
            --format sarif --output trivy-sbom.sarif sbom.cdx.json

      - name: "Trivy: image filesystem (app artifacts, secrets, misconfig)"
        run: |
          nix run --inputs-from . nixpkgs#trivy -- image --input result \
            --format sarif --output trivy-image.sarif --severity HIGH,CRITICAL

      # SARIF -> Security tab needs code scanning, which private repos only get
      # with GitHub Advanced Security. Keep it non-fatal so builds still publish;
      # Trivy findings remain in the step log and the SBOM artifact regardless.
      # `always()` alone spams "Path does not exist" annotations when the build
      # step failed and the SARIF was never written — only upload what exists.
      - name: Upload SBOM SARIF
        if: ${{ !cancelled() && hashFiles('trivy-sbom.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-sbom.sarif
          category: sbom-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}

      - name: Upload image SARIF
        if: ${{ !cancelled() && hashFiles('trivy-image.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: image-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}
          path: sbom.cdx.json

      - name: Smoke test (image actually runs)
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          ref=$(docker load -i result | sed -n 's/^Loaded image: //p' | head -n1)
          echo "loaded: $ref"
          case "$IMAGE" in
            jre)    docker run --rm --entrypoint /runtime/bin/java    "$ref" -version ;;
            python) docker run --rm --entrypoint /runtime/bin/python3 "$ref" -c 'print("varde ok")' ;;
            node)   docker run --rm --entrypoint /runtime/bin/node    "$ref" -e 'console.log("varde ok")' ;;
            # Compile a hello with the runner's *system* toolchain (not Nix) and
            # run it via the inherited /app/app entrypoint. static -> scratch base;
            # glibc/musl -> the FHS loader + libs for that libc.
            static) printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    cc -static -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            glibc)  printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    cc -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            musl)   sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
                    printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    musl-gcc -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            # Detached services run WITHOUT --rm: a boot crash must leave the
            # container behind so the failure branch's `docker logs` has
            # something to show (rabbitmq's first failure self-deleted its
            # evidence). Both exit paths docker rm -f explicitly.
            redis)  docker run -d --name vr "$ref" >/dev/null
                    for _ in $(seq 1 20); do docker exec vr /runtime/bin/redis-cli ping 2>/dev/null | grep -q PONG && break; sleep 0.5; done
                    docker exec vr /runtime/bin/redis-cli ping | grep -q PONG || { docker logs vr; docker rm -f vr; exit 1; }
                    echo "varde ok"; docker rm -f vr >/dev/null ;;
            php)    docker run --rm --entrypoint /runtime/bin/php "$ref" -r 'echo "varde ok\n";' | grep -q "varde ok" ;;
            # One-time initdb against a volume (the documented contract), then serve.
            postgres) docker volume create vpg >/dev/null
                    docker run --rm -v vpg:/app --entrypoint /runtime/bin/initdb "$ref" -U postgres --auth=trust
                    docker run -d --name vp -v vpg:/app "$ref" >/dev/null
                    for _ in $(seq 1 40); do docker exec vp /runtime/bin/pg_isready -U postgres 2>/dev/null | grep -q "accepting connections" && break; sleep 0.5; done
                    docker exec vp /runtime/bin/psql -U postgres -tAc "SELECT 1" | grep -qx 1 || { docker logs vp; docker rm -f vp; exit 1; }
                    echo "varde ok"; docker rm -f vp >/dev/null; docker volume rm vpg >/dev/null ;;
            # Native no-shell init (mysqld --initialize-insecure), then serve.
            mysql)  docker volume create vmy >/dev/null
                    docker run --rm -v vmy:/app "$ref" --initialize-insecure
                    docker run -d --name vm -v vmy:/app "$ref" >/dev/null
                    for _ in $(seq 1 60); do docker exec vm /runtime/bin/mysqladmin -u root ping 2>/dev/null | grep -q alive && break; sleep 0.5; done
                    docker exec vm /runtime/bin/mysql -u root -e 'SELECT 1' >/dev/null || { docker logs vm; docker rm -f vm; exit 1; }
                    echo "varde ok"; docker rm -f vm >/dev/null; docker volume rm vmy >/dev/null ;;
            # CLI escripts are on PATH (kernel shebang -> in-image ELF, no shell).
            rabbitmq) docker run -d --name vq "$ref" >/dev/null
                    ok=1; for _ in $(seq 1 60); do docker exec vq rabbitmq-diagnostics ping >/dev/null 2>&1 && { ok=0; break; }; sleep 1; done
                    [ "$ok" -eq 0 ] || { docker logs vq; docker rm -f vq; exit 1; }
                    echo "varde ok"; docker rm -f vq >/dev/null ;;
            # No client binary in the image and no shell: probe from the runner
            # over TCP with bash's /dev/tcp.
            memcached) docker run -d --name vmc -p 127.0.0.1:18211:11211 "$ref" >/dev/null
                    ok=1
                    for _ in $(seq 1 40); do
                      if exec 3<>/dev/tcp/127.0.0.1/18211 2>/dev/null; then
                        printf 'stats\r\nquit\r\n' >&3
                        grep -q "STAT uptime" <&3 && ok=0
                        exec 3>&- 3<&- || true
                        [ "$ok" -eq 0 ] && break
                      fi
                      sleep 0.5
                    done
                    [ "$ok" -eq 0 ] || { docker logs vmc; docker rm -f vmc; exit 1; }
                    echo "varde ok"; docker rm -f vmc >/dev/null ;;
            nginx)  echo '<h1>varde ok</h1>' > index.html
                    docker run --rm -d --name vn -p 18080:8080 -v "$PWD/index.html:/app/index.html:ro" "$ref" >/dev/null
                    for _ in $(seq 1 20); do curl -fsS localhost:18080 2>/dev/null | grep -q "varde ok" && break; sleep 0.5; done
                    curl -fsS localhost:18080 | grep -q "varde ok" || { docker logs vn; docker rm -f vn; exit 1; }
                    echo "varde ok"; docker rm -f vn >/dev/null ;;
            *)      echo "no smoke test defined for '$IMAGE'" ;;
          esac

      # One GHCR login for cosign and the provenance action (skopeo below uses
      # --dest-creds directly and doesn't need it).
      - name: Log in to GHCR (signing + attestation)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: Actions creates each GHCR package PRIVATE by default, even from a
      # public repo. After the first run, flip each varde-* package to Public
      # (and connect it to this repo) or anonymous `docker pull` returns 401.
      # See the README ("First publish, one-time step").
      - name: Push per-arch image to GHCR
        if: github.event_name != 'pull_request'
        env:
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ matrix.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          img="${REGISTRY}/${owner}/varde-${IMAGE}"
          # The runner's /etc/containers/registries.conf is v1, which skopeo
          # rejects. Point it at a minimal v2 config instead.
          conf="$(mktemp)"; printf 'unqualified-search-registries = []\n' > "$conf"
          export CONTAINERS_REGISTRIES_CONF="$conf"
          dgst="$RUNNER_TEMP/digest.txt"
          nix run --inputs-from . nixpkgs#skopeo -- --insecure-policy copy \
            --digestfile "$dgst" \
            --dest-creds "${ACTOR}:${TOKEN}" \
            docker-archive:result \
            "docker://${img}:${TAG}-${ARCH}"
          # Hand the exact pushed image name + digest to the signing/attest steps.
          digest=$(cat "$dgst")
          {
            echo "IMAGE_NAME=${img}"
            echo "IMAGE_DIGEST=${digest}"
            echo "IMAGE_REF=${img}@${digest}"
          } >> "$GITHUB_ENV"

      # Keyless (GitHub OIDC) signature + a CycloneDX SBOM attestation on the
      # just-pushed per-arch digest. The SBOM is this arch's exact Nix closure
      # (system packages + runtime), so the attestation matches the image it's
      # attached to. Recorded in the public Rekor transparency log; verify with
      # `cosign verify` / `cosign verify-attestation` (see the README).
      - name: Sign image + attach SBOM attestation (cosign, keyless)
        if: github.event_name != 'pull_request'
        run: |
          nix run --inputs-from . nixpkgs#cosign -- sign --yes "$IMAGE_REF"
          nix run --inputs-from . nixpkgs#cosign -- attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE_REF"

      # SLSA build-provenance attestation (structured: builder, source commit,
      # invocation) on the same per-arch digest, pushed to GHCR as a referrer so
      # it travels with the image. Verify with `gh attestation verify oci://…`.
      - name: Attest build provenance (SLSA)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

  manifest:
    name: multi-arch manifests
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # Checkout gives `--inputs-from .` the repo's flake.lock to resolve nixpkgs from.
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22 (for `nix build --inputs-from . nixpkgs#cosign`)
        with:
          determinate: false # no FlakeHub login attempt (see setup job)
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign runs once per unique digest below; build it once from the repo's
      # pinned nixpkgs instead of paying a `nix run` evaluation per signature.
      - name: Install cosign (pinned via flake.lock)
        run: |
          nix build --inputs-from . nixpkgs#cosign -o "$RUNNER_TEMP/cosign"
          echo "$RUNNER_TEMP/cosign/bin" >> "$GITHUB_PATH"

      - name: Assemble manifest lists (libc tags, bare/latest aliases, image aliases)
        env:
          OWNER: ${{ github.repository_owner }}
          MATRIX: ${{ needs.setup.outputs.matrix }}
          LATEST: ${{ needs.setup.outputs.latest }}
          ALIASES: ${{ needs.setup.outputs.aliases }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]'); reg="${REGISTRY}"
          imgref(){ echo "${reg}/${owner}/varde-$1"; }
          hastag(){ printf '%s' "$MATRIX" | jq -e --arg im "$1" --arg t "$2" \
            '.include[]|select(.image==$im and .tag==$t)' >/dev/null; }

          # Three phases: plan (serial, cheap) -> create (parallel: every list
          # is assembled from per-arch tags, so no list depends on another) ->
          # sign (deduplicated: bare-version, :latest, and alias tags assemble
          # byte-identical indexes, so one keyless signature per repo@digest
          # covers them all — cosign signs the digest, and `cosign verify <tag>`
          # resolves the tag to that digest first). Per-arch SBOM attestations
          # live on the child digests, attached in the build job.
          planfile="$RUNNER_TEMP/manifest-plan"
          : > "$planfile"
          plan(){ printf '%s %s %s\n' "$1" "$2" "$3" >> "$planfile"; }

          # 1) One multi-arch list per image:matrix-tag (concrete libc-qualified or
          #    plain-'latest' tags, e.g. jre:21-musl, redis:latest-glibc, static:latest).
          printf '%s' "$MATRIX" | jq -r '.include[]|"\(.image) \(.tag)"' | sort -u \
          | while read -r image tag; do
              i=$(imgref "$image"); plan "${i}:${tag}" "${i}:${tag}-amd64" "${i}:${tag}-arm64"
            done

          # 2) For libc-axis images (tags carry -musl/-glibc): bare-version aliases to
          #    the default libc (musl if built, else glibc), plus :latest / :latest-glibc.
          for image in $(printf '%s' "$MATRIX" | jq -r '[.include[].image]|unique[]'); do
            has_libc=$(printf '%s' "$MATRIX" | jq -r --arg im "$image" \
              '[.include[]|select(.image==$im)|.tag]|any(test("-(musl|glibc)$"))')
            [ "$has_libc" = "true" ] || continue
            i=$(imgref "$image")
            printf '%s' "$MATRIX" | jq -r --arg im "$image" '.include[]|select(.image==$im)|.tag' \
              | sed -E 's/-(musl|glibc)$//' | sort -u \
              | while read -r ver; do
                  if hastag "$image" "${ver}-musl"; then d=musl; else d=glibc; fi
                  plan "${i}:${ver}" "${i}:${ver}-${d}-amd64" "${i}:${ver}-${d}-arm64"
                done
            lv=$(printf '%s' "$LATEST" | jq -r --arg im "$image" '.[$im] // empty')
            [ -n "$lv" ] || continue
            if hastag "$image" "${lv}-musl"; then d=musl; else d=glibc; fi
            plan "${i}:latest" "${i}:${lv}-${d}-amd64" "${i}:${lv}-${d}-arm64"
            if hastag "$image" "${lv}-glibc"; then
              plan "${i}:latest-glibc" "${i}:${lv}-glibc-amd64" "${i}:${lv}-glibc-arm64"
            fi
          done

          # 3) Image aliases (varde-go -> varde-static, varde-rust -> varde-glibc):
          #    mirror every source tag, and point :latest at the source's *declared*
          #    latest tag — not once per source tag, which duplicated the create/sign
          #    and would let an arbitrary tag win if a source ever grew a second one.
          printf '%s' "$ALIASES" | jq -r 'to_entries[]|"\(.key) \(.value)"' \
          | while read -r alias src; do
              a=$(imgref "$alias"); si=$(imgref "$src")
              for t in $(printf '%s' "$MATRIX" | jq -r --arg s "$src" \
                  '.include[]|select(.image==$s)|.tag' | sort -u); do
                plan "${a}:${t}" "${si}:${t}-amd64" "${si}:${t}-arm64"
              done
              lv=$(printf '%s' "$LATEST" | jq -r --arg im "$src" '.[$im] // empty')
              [ -n "$lv" ] || continue
              if hastag "$src" "$lv"; then sfx="$lv"                  # plain tag (static:latest)
              elif hastag "$src" "${lv}-musl"; then sfx="${lv}-musl"  # default libc
              else sfx="${lv}-glibc"; fi
              plan "${a}:latest" "${si}:${sfx}-amd64" "${si}:${sfx}-arm64"
            done

          # Identical replans (e.g. redis:latest is both a matrix tag and the
          # :latest of the sole version) collapse under sort -u; the same tag
          # planned with DIFFERENT children would be a generator bug — fail
          # loudly rather than race two writers in the parallel phase.
          sort -u "$planfile" -o "$planfile"
          [ -s "$planfile" ] || { echo "empty manifest plan" >&2; exit 1; }
          dups=$(awk '{print $1}' "$planfile" | sort | uniq -d)
          [ -z "$dups" ] || { echo "conflicting manifest plans for: $dups" >&2; exit 1; }

          create_one(){
            docker buildx imagetools create -t "$1" "$2" "$3"
            d=$(docker buildx imagetools inspect "$1" --format '{{.Manifest.Digest}}')
            printf '%s@%s\n' "${1%:*}" "$d" >> "$SIGNLIST"
          }
          export -f create_one
          export SIGNLIST="$RUNNER_TEMP/sign-list"
          : > "$SIGNLIST"
          xargs -P 8 -n 3 bash -c 'set -euo pipefail; create_one "$@"' _ < "$planfile"

          sort -u "$SIGNLIST" -o "$SIGNLIST"
          echo "created $(wc -l < "$planfile") manifest lists; signing $(wc -l < "$SIGNLIST") unique digests"
          xargs -P 4 -n 1 cosign sign --yes < "$SIGNLIST"
