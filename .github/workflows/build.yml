name: build-image

# Builds every varde image discovered in images/*.nix — for each variant and on
# native amd64 + arm64 runners — scans each with Trivy (system packages + runtime
# via SBOM, plus an image filesystem scan), publishes per-arch tags to GHCR,
# keyless-signs them and attaches a CycloneDX SBOM attestation (cosign + GitHub
# OIDC), and stitches multi-arch + :latest manifest lists (signing each index).
# The build matrix and the :latest mapping come straight from the flake
# (.#ciMatrix / .#latestTags), so adding an image module needs no workflow changes.
# A shared Cachix cache holds the from-source musl builds so later runs (and the
# e2e workflow) pull them instead of recompiling.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly rebuild for fresh CVE fixes

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # keyless cosign signing + SBOM attestation (GitHub OIDC)
  actions: read # let codeql-action read this run for its telemetry call

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never a half-done main publish: cancelling
  # mid-run skips the manifest job and leaves GHCR with per-arch tags but no
  # multi-arch/latest/alias manifest lists.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  TRIVY_USERNAME: ${{ github.actor }}
  TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  setup:
    name: compute matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      latest: ${{ steps.gen.outputs.latest }}
      aliases: ${{ steps.gen.outputs.aliases }}
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # On the weekly cron, bump nixpkgs ONCE here and share the resolved lock with
      # every build job, so all images in a run — and both arches of each tag —
      # build against a single nixpkgs revision (otherwise each job's own
      # `nix flake update` could pull a different nixos-unstable tip).
      - name: Refresh nixpkgs (scheduled only)
        if: github.event_name == 'schedule'
        run: nix flake update
      - name: Upload resolved flake.lock
        uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock
      - id: gen
        name: Derive build matrix from the flake
        run: |
          # Cross each {image,tag,attr,sbomName} with the two native arches.
          matrix=$(nix eval --json .#ciMatrix | jq -c '{include: [
            .[] as $i
            | ({name:"amd64",runner:"ubuntu-latest"}, {name:"arm64",runner:"ubuntu-24.04-arm"}) as $a
            | $i + {arch:$a.name, runner:$a.runner}
          ]}')
          latest=$(nix eval --json .#latestTags)
          aliases=$(nix eval --json .#imageAliases)
          {
            echo "matrix=$matrix"
            echo "latest=$latest"
            echo "aliases=$aliases"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.image }}:${{ matrix.tag }} (${{ matrix.arch }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # Shared binary cache: the first run compiles the from-source musl variants
      # (node/nginx/redis, and everything on aarch64-musl); every run after that
      # pulls them instead of recompiling. Public cache -> anonymous reads work
      # (fork PRs, end users); pushing needs the CACHIX_AUTH_TOKEN secret.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: varde
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build against the exact flake.lock the setup job resolved (see there), so
      # this run is internally consistent across images and arches.
      - name: Fetch shared flake.lock
        uses: actions/download-artifact@v8
        with:
          name: flake-lock

      - name: Build image
        env:
          ATTR: ${{ matrix.attr }}
        run: nix build -L ".#${ATTR}"

      - name: Generate SBOM (full closure incl. system packages)
        env:
          SBOM: ${{ matrix.sbomName }}
        run: nix run ".#${SBOM}" -- sbom.cdx.json

      - name: "Trivy: system packages + runtime (SBOM scan)"
        run: |
          # Report-only: a base image should still publish so its SBOM/SARIF stays
          # visible (Security tab) for downstream to act on. Enforce hard gates in
          # the *app* image, not here.
          nix run nixpkgs#trivy -- sbom --scanners vuln --severity HIGH,CRITICAL sbom.cdx.json
          nix run nixpkgs#trivy -- sbom --scanners vuln \
            --format sarif --output trivy-sbom.sarif sbom.cdx.json

      - name: "Trivy: image filesystem (app artifacts, secrets, misconfig)"
        run: |
          nix run nixpkgs#trivy -- image --input result \
            --format sarif --output trivy-image.sarif --severity HIGH,CRITICAL

      # SARIF -> Security tab needs code scanning, which private repos only get
      # with GitHub Advanced Security. Keep it non-fatal so builds still publish;
      # Trivy findings remain in the step log and the SBOM artifact regardless.
      - name: Upload SBOM SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-sbom.sarif
          category: sbom-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}

      - name: Upload image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: image-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.image }}-${{ matrix.tag }}-${{ matrix.arch }}
          path: sbom.cdx.json

      - name: Smoke test (image actually runs)
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          ref=$(docker load -i result | sed -n 's/^Loaded image: //p' | head -n1)
          echo "loaded: $ref"
          case "$IMAGE" in
            jre)    docker run --rm --entrypoint /runtime/bin/java    "$ref" -version ;;
            python) docker run --rm --entrypoint /runtime/bin/python3 "$ref" -c 'print("varde ok")' ;;
            node)   docker run --rm --entrypoint /runtime/bin/node    "$ref" -e 'console.log("varde ok")' ;;
            # Compile a hello with the runner's *system* toolchain (not Nix) and
            # run it via the inherited /app/app entrypoint. static -> scratch base;
            # glibc/musl -> the FHS loader + libs for that libc.
            static) printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    cc -static -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            glibc)  printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    cc -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            musl)   sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
                    printf '#include <stdio.h>\nint main(){puts("varde ok");return 0;}\n' > hello.c
                    musl-gcc -o app hello.c
                    docker run --rm -v "$PWD/app:/app/app:ro" "$ref" | grep -q "varde ok" ;;
            redis)  docker run --rm -d --name vr "$ref" >/dev/null
                    for _ in $(seq 1 20); do docker exec vr /runtime/bin/redis-cli ping 2>/dev/null | grep -q PONG && break; sleep 0.5; done
                    docker exec vr /runtime/bin/redis-cli ping | grep -q PONG || { docker logs vr; docker rm -f vr; exit 1; }
                    echo "varde ok"; docker rm -f vr >/dev/null ;;
            nginx)  echo '<h1>varde ok</h1>' > index.html
                    docker run --rm -d --name vn -p 18080:8080 -v "$PWD/index.html:/app/index.html:ro" "$ref" >/dev/null
                    for _ in $(seq 1 20); do curl -fsS localhost:18080 2>/dev/null | grep -q "varde ok" && break; sleep 0.5; done
                    curl -fsS localhost:18080 | grep -q "varde ok" || { docker logs vn; docker rm -f vn; exit 1; }
                    echo "varde ok"; docker rm -f vn >/dev/null ;;
            *)      echo "no smoke test defined for '$IMAGE'" ;;
          esac

      # NOTE: Actions creates each GHCR package PRIVATE by default, even from a
      # public repo. After the first run, flip each varde-* package to Public
      # (and connect it to this repo) or anonymous `docker pull` returns 401.
      # See the README ("First publish, one-time step").
      - name: Push per-arch image to GHCR
        if: github.event_name != 'pull_request'
        env:
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ matrix.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          img="${REGISTRY}/${owner}/varde-${IMAGE}"
          # The runner's /etc/containers/registries.conf is v1, which skopeo
          # rejects. Point it at a minimal v2 config instead.
          conf="$(mktemp)"; printf 'unqualified-search-registries = []\n' > "$conf"
          export CONTAINERS_REGISTRIES_CONF="$conf"
          dgst="$RUNNER_TEMP/digest.txt"
          nix run nixpkgs#skopeo -- --insecure-policy copy \
            --digestfile "$dgst" \
            --dest-creds "${ACTOR}:${TOKEN}" \
            docker-archive:result \
            "docker://${img}:${TAG}-${ARCH}"
          # Hand the exact pushed digest to the signing step (sign by digest, not tag).
          echo "IMAGE_REF=${img}@$(cat "$dgst")" >> "$GITHUB_ENV"

      # Keyless (GitHub OIDC) signature + a CycloneDX SBOM attestation on the
      # just-pushed per-arch digest. The SBOM is this arch's exact Nix closure
      # (system packages + runtime), so the attestation matches the image it's
      # attached to. Recorded in the public Rekor transparency log; verify with
      # `cosign verify` / `cosign verify-attestation` (see the README).
      - name: Sign image + attach SBOM attestation (cosign, keyless)
        if: github.event_name != 'pull_request'
        env:
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run nixpkgs#cosign -- login "$REGISTRY" -u "$ACTOR" --password-stdin <<<"$TOKEN"
          nix run nixpkgs#cosign -- sign --yes "$IMAGE_REF"
          nix run nixpkgs#cosign -- attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE_REF"

  manifest:
    name: multi-arch manifests
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22 (for `nix run nixpkgs#cosign`)
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble manifest lists (libc tags, bare/latest aliases, image aliases)
        env:
          OWNER: ${{ github.repository_owner }}
          MATRIX: ${{ needs.setup.outputs.matrix }}
          LATEST: ${{ needs.setup.outputs.latest }}
          ALIASES: ${{ needs.setup.outputs.aliases }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]'); reg="${REGISTRY}"
          imgref(){ echo "${reg}/${owner}/varde-$1"; }
          # Create the multi-arch list, then keyless-sign the resulting index so
          # `cosign verify <tag>` works for anything a user pulls. (Per-arch SBOM
          # attestations live on the child digests, attached in the build job.)
          create(){
            docker buildx imagetools create -t "$1" "$2" "$3"
            d=$(docker buildx imagetools inspect "$1" --format '{{.Manifest.Digest}}')
            nix run nixpkgs#cosign -- sign --yes "${1%:*}@${d}"
          }
          hastag(){ printf '%s' "$MATRIX" | jq -e --arg im "$1" --arg t "$2" \
            '.include[]|select(.image==$im and .tag==$t)' >/dev/null; }

          # 1) One multi-arch list per image:matrix-tag (concrete libc-qualified or
          #    plain-'latest' tags, e.g. jre:21-musl, redis:latest-glibc, static:latest).
          printf '%s' "$MATRIX" | jq -r '.include[]|"\(.image) \(.tag)"' | sort -u \
          | while read -r image tag; do
              i=$(imgref "$image"); create "${i}:${tag}" "${i}:${tag}-amd64" "${i}:${tag}-arm64"
            done

          # 2) For libc-axis images (tags carry -musl/-glibc): bare-version aliases to
          #    the default libc (musl if built, else glibc), plus :latest / :latest-glibc.
          for image in $(printf '%s' "$MATRIX" | jq -r '[.include[].image]|unique[]'); do
            has_libc=$(printf '%s' "$MATRIX" | jq -r --arg im "$image" \
              '[.include[]|select(.image==$im)|.tag]|any(test("-(musl|glibc)$"))')
            [ "$has_libc" = "true" ] || continue
            i=$(imgref "$image")
            printf '%s' "$MATRIX" | jq -r --arg im "$image" '.include[]|select(.image==$im)|.tag' \
              | sed -E 's/-(musl|glibc)$//' | sort -u \
              | while read -r ver; do
                  if hastag "$image" "${ver}-musl"; then d=musl; else d=glibc; fi
                  create "${i}:${ver}" "${i}:${ver}-${d}-amd64" "${i}:${ver}-${d}-arm64"
                done
            lv=$(printf '%s' "$LATEST" | jq -r --arg im "$image" '.[$im] // empty')
            [ -n "$lv" ] || continue
            if hastag "$image" "${lv}-musl"; then d=musl; else d=glibc; fi
            create "${i}:latest" "${i}:${lv}-${d}-amd64" "${i}:${lv}-${d}-arm64"
            if hastag "$image" "${lv}-glibc"; then
              create "${i}:latest-glibc" "${i}:${lv}-glibc-amd64" "${i}:${lv}-glibc-arm64"
            fi
          done

          # 3) Image aliases (varde-go -> varde-static, varde-rust -> varde-glibc):
          #    mirror the source's per-arch digests under the alias name + :latest.
          printf '%s' "$ALIASES" | jq -r 'to_entries[]|"\(.key) \(.value)"' \
          | while read -r alias src; do
              a=$(imgref "$alias"); si=$(imgref "$src")
              for t in $(printf '%s' "$MATRIX" | jq -r --arg s "$src" \
                  '.include[]|select(.image==$s)|.tag' | sort -u); do
                create "${a}:${t}" "${si}:${t}-amd64" "${si}:${t}-arm64"
                create "${a}:latest" "${si}:${t}-amd64" "${si}:${t}-arm64"
              done
            done
