name: pages

# Deploys the static landing page in site/ to GitHub Pages.
# Requires repo Settings → Pages → Source = "GitHub Actions" (and, on the Free
# plan, a public repository — Pages for private repos needs a paid plan).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      # Pages must be enabled once, out-of-band: Settings → Pages → Source =
      # "GitHub Actions" (or `gh api -X POST repos/OWNER/REPO/pages -f
      # build_type=workflow`). The default GITHUB_TOKEN can't create the Pages
      # site itself — `enablement: true` fails with "Resource not accessible by
      # integration" even on a public repo — so we don't rely on it here.
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
