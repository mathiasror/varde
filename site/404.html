<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — off the trail · varde</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#070A10" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <!-- Self-contained: no external CSS, so this renders correctly no matter
       what path depth the missing URL was requested at. -->
  <style>
    :root {
      --ink: #070A10; --text: #EAEFF7; --muted: #7C879B;
      --hair: rgba(255,255,255,0.12);
      --sans: "Inter var", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--ink); color: var(--text); font-family: var(--sans);
      display: grid; place-items: center; text-align: center; padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 34rem; }
    .mark { width: 68px; height: 68px; margin: 0 auto 1.75rem; display: block; }
    .code {
      font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 800; line-height: 1;
      letter-spacing: -0.02em; margin: 0;
      background: linear-gradient(102deg, #3DE7C7, #4D87FF 40%, #9A7CFF 72%, #C77DFF);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h1 { font-size: 1.4rem; font-weight: 650; margin: 1.25rem 0 0.5rem; letter-spacing: -0.01em; }
    p { color: var(--muted); line-height: 1.6; margin: 0 auto 2rem; max-width: 30rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.3rem; border-radius: 0.6rem; font-weight: 600;
      text-decoration: none; color: #070A10;
      background: linear-gradient(102deg, #3DE7C7, #4D87FF 45%, #9A7CFF 78%, #C77DFF);
    }
    .btn:focus-visible { outline: 2px solid #7af0db; outline-offset: 3px; }
    .btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <main class="wrap">
    <svg class="mark" viewBox="0 0 32 32" role="img" aria-label="varde">
      <defs>
        <linearGradient id="s" gradientUnits="userSpaceOnUse" x1="16" y1="30" x2="16" y2="3">
          <stop offset="0" stop-color="#3DE7C7"/>
          <stop offset="0.45" stop-color="#4D87FF"/>
          <stop offset="0.78" stop-color="#9A7CFF"/>
          <stop offset="1" stop-color="#C77DFF"/>
        </linearGradient>
      </defs>
      <g fill="url(#s)">
        <ellipse cx="16" cy="26.4" rx="11" ry="3.5" transform="rotate(-2 16 26.4)"/>
        <ellipse cx="14.6" cy="20.2" rx="8.4" ry="3.1" transform="rotate(3 14.6 20.2)"/>
        <ellipse cx="17.1" cy="14.6" rx="6.4" ry="2.7" transform="rotate(-3 17.1 14.6)"/>
        <ellipse cx="15.4" cy="9.6" rx="4.5" ry="2.3" transform="rotate(4 15.4 9.6)"/>
        <ellipse cx="16.6" cy="5.4" rx="2.7" ry="1.8"/>
      </g>
    </svg>
    <p class="code">404</p>
    <h1>Off the trail.</h1>
    <p>No cairn marks this path — the page you're after isn't here.
       Head back and follow the stones.</p>
    <a class="btn" href="/varde/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Back to varde
    </a>
  </main>
</body>
</html>
